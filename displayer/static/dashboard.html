<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STS2 AI 思考面板</title>
<style>
  :root {
    --bg: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-bubble: #0f3460;
    --text: #e0e0e0;
    --text-muted: #888;
    --accent: #e94560;
    --accent-dim: #533483;
    --border: #2a2a4a;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --blue: #60a5fa;
    --cyan: #22d3ee;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  header h1 .icon { font-size: 20px; }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    transition: background 0.3s;
  }

  .status-dot.connected { background: var(--green); }

  .controls {
    display: flex;
    gap: 8px;
  }

  .controls button {
    background: var(--bg);
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }

  .controls button:hover {
    color: var(--text);
    border-color: var(--accent);
  }

  /* ===== Two-column layout ===== */
  #main-layout {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* --- Left: Thinking panel --- */
  #thinking-panel {
    width: 38%;
    min-width: 320px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: #141428;
  }

  #thinking-panel .panel-header {
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    color: var(--blue);
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #current-thinking {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    max-height: 45%;
    overflow-y: auto;
  }

  #current-thinking .label {
    font-size: 11px;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  #current-thinking .thinking-content {
    background: linear-gradient(135deg, #122040 0%, #1a2d50 100%);
    border: 1px solid var(--blue);
    border-left: 3px solid var(--blue);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 14.5px;
    line-height: 1.85;
    white-space: pre-wrap;
    word-wrap: break-word;
    color: #e8edf5;
  }

  #current-thinking .thinking-time {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
    text-align: right;
  }

  #current-thinking .empty-thinking {
    color: var(--text-muted);
    font-size: 13px;
    text-align: center;
    padding: 24px 0;
  }

  #thinking-history {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #thinking-history .label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
    padding-left: 4px;
    flex-shrink: 0;
  }

  .thinking-history-item {
    background: var(--bg-bubble);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
    opacity: 0.75;
    transition: opacity 0.2s;
  }

  .thinking-history-item:hover {
    opacity: 1;
  }

  .thinking-history-item .hist-time {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
    display: block;
  }

  .thinking-history-item.is-thinking {
    border-left: 2px solid var(--cyan);
  }

  .thinking-history-item.is-narration {
    border-left: 2px solid var(--blue);
  }

  /* --- Right: Action feed --- */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
  }

  .message {
    max-width: 95%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    animation: fadeIn 0.3s ease;
    word-wrap: break-word;
  }

  .message.thinking {
    background: var(--bg-bubble);
    border: 1px solid var(--border);
    align-self: flex-start;
  }

  .message.narration {
    background: linear-gradient(135deg, #1a2744 0%, #1e2d4d 100%);
    border: 1px solid #3b5998;
    border-left: 3px solid var(--blue);
    align-self: stretch;
    font-size: 14.5px;
    line-height: 1.8;
    padding: 14px 18px;
  }

  .message.action {
    background: var(--accent-dim);
    border: 1px solid #6b3fa0;
    align-self: flex-start;
  }

  .message.state {
    background: #0d2847;
    border: 1px solid #1e3a5f;
    align-self: flex-start;
    font-family: 'Cascadia Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.5;
  }

  .message.turn_end {
    background: #1a1a2e;
    border: 1px solid var(--yellow);
    border-left: 3px solid var(--yellow);
    align-self: stretch;
    text-align: center;
    font-size: 13px;
    color: var(--yellow);
    padding: 6px 14px;
  }

  .message.navigation {
    background: #0d2e1e;
    border: 1px solid #1a5c3a;
    align-self: flex-start;
  }

  .message.error {
    background: #3b1111;
    border: 1px solid #7f1d1d;
    align-self: flex-start;
  }

  .message .timestamp {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    display: block;
  }

  .message .content {
    white-space: pre-wrap;
  }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--accent);
    animation: blink 0.7s infinite;
    vertical-align: text-bottom;
    margin-left: 2px;
  }

  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--text-muted);
    text-align: center;
    gap: 12px;
  }

  .empty-state .icon { font-size: 48px; }
  .empty-state p { font-size: 14px; max-width: 300px; }

  #scroll-anchor {
    height: 1px;
    flex-shrink: 0;
  }

  /* Scrollbar styling */
  #messages::-webkit-scrollbar,
  #thinking-history::-webkit-scrollbar,
  #current-thinking::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-track,
  #thinking-history::-webkit-scrollbar-track,
  #current-thinking::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb,
  #thinking-history::-webkit-scrollbar-thumb,
  #current-thinking::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }
  #messages::-webkit-scrollbar-thumb:hover,
  #thinking-history::-webkit-scrollbar-thumb:hover,
  #current-thinking::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* Resize handle between panels */
  #panel-resize {
    width: 4px;
    cursor: col-resize;
    background: var(--border);
    transition: background 0.2s;
    flex-shrink: 0;
  }
  #panel-resize:hover { background: var(--blue); }
</style>
</head>
<body>

<header>
  <h1><span class="icon">🎮</span> STS2 AI 思考面板</h1>
  <div style="display: flex; align-items: center; gap: 16px;">
    <div class="controls">
      <button onclick="clearHistory()">清除</button>
    </div>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">连接中...</span>
    </div>
  </div>
</header>

<div id="main-layout">
  <!-- Left: AI Thinking Panel -->
  <div id="thinking-panel">
    <div class="panel-header">🧠 AI 思考过程</div>
    <div id="current-thinking">
      <div class="label">当前思考</div>
      <div class="empty-thinking" id="thinkingEmpty">等待 AI 开始分析...</div>
    </div>
    <div id="thinking-history">
      <div class="label">思考历史</div>
    </div>
  </div>

  <div id="panel-resize"></div>

  <!-- Right: Action Feed -->
  <div id="messages">
    <div class="empty-state" id="emptyState">
      <div class="icon">🎮</div>
      <p>等待 AI 开始游戏...<br>操作记录将实时显示在这里。</p>
    </div>
  </div>
</div>
<div id="scroll-anchor"></div>

<script>
const messagesEl = document.getElementById('messages');
const thinkingPanel = document.getElementById('thinking-panel');
const currentThinkingEl = document.getElementById('current-thinking');
const thinkingHistoryEl = document.getElementById('thinking-history');
const thinkingEmpty = document.getElementById('thinkingEmpty');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const emptyState = document.getElementById('emptyState');
const scrollAnchor = document.getElementById('scroll-anchor');

let autoScroll = true;
let autoScrollThinking = true;
let lastEventId = 0;
let eventSource = null;
let typingQueue = [];
let isTyping = false;
const MAX_DOM_MESSAGES = 300;
const MAX_THINKING_HISTORY = 50;

// Track whether thinking panel has content
let currentThinkingData = null;

// --- Panel resize ---
const resizeHandle = document.getElementById('panel-resize');
let isResizing = false;
resizeHandle.addEventListener('mousedown', (e) => {
  isResizing = true;
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});
document.addEventListener('mousemove', (e) => {
  if (!isResizing) return;
  const mainLayout = document.getElementById('main-layout');
  const rect = mainLayout.getBoundingClientRect();
  const pct = ((e.clientX - rect.left) / rect.width) * 100;
  if (pct > 20 && pct < 60) {
    thinkingPanel.style.width = pct + '%';
  }
});
document.addEventListener('mouseup', () => {
  if (isResizing) {
    isResizing = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});

// Detect if user scrolled up to pause auto-scroll (action feed)
messagesEl.addEventListener('scroll', () => {
  const threshold = 50;
  const atBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < threshold;
  autoScroll = atBottom;
});

// Auto-scroll for thinking history
thinkingHistoryEl.addEventListener('scroll', () => {
  const threshold = 50;
  const atBottom = thinkingHistoryEl.scrollHeight - thinkingHistoryEl.scrollTop - thinkingHistoryEl.clientHeight < threshold;
  autoScrollThinking = atBottom;
});

function scrollToBottom() {
  if (autoScroll) {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
}

function scrollThinkingToBottom() {
  if (autoScrollThinking) {
    thinkingHistoryEl.scrollTop = thinkingHistoryEl.scrollHeight;
  }
}

function formatTime(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function trimOldMessages() {
  const msgs = messagesEl.querySelectorAll('.message');
  const overflow = msgs.length - MAX_DOM_MESSAGES;
  if (overflow > 0) {
    for (let i = 0; i < overflow; i++) {
      msgs[i].remove();
    }
  }
}

function trimThinkingHistory() {
  const items = thinkingHistoryEl.querySelectorAll('.thinking-history-item');
  const overflow = items.length - MAX_THINKING_HISTORY;
  if (overflow > 0) {
    for (let i = 0; i < overflow; i++) {
      items[i].remove();
    }
  }
}

// Check if this event type belongs to the thinking panel
function isThinkingEvent(eventType) {
  return eventType === 'narration' || eventType === 'thinking';
}

// Push current thinking to history
function archiveCurrentThinking() {
  if (!currentThinkingData) return;

  const item = document.createElement('div');
  item.className = 'thinking-history-item ' +
    (currentThinkingData.event_type === 'thinking' ? 'is-thinking' : 'is-narration');

  const textSpan = document.createElement('span');
  textSpan.textContent = currentThinkingData.text;

  const timeSpan = document.createElement('span');
  timeSpan.className = 'hist-time';
  timeSpan.textContent = formatTime(currentThinkingData.timestamp);

  item.appendChild(textSpan);
  item.appendChild(timeSpan);
  thinkingHistoryEl.appendChild(item);

  trimThinkingHistory();
  scrollThinkingToBottom();
}

// Set content in the current thinking area
function setCurrentThinking(event) {
  // Archive previous thinking
  archiveCurrentThinking();

  // Remove empty placeholder if present
  if (thinkingEmpty && thinkingEmpty.parentNode) {
    thinkingEmpty.remove();
  }

  // Update current thinking content
  currentThinkingData = event;

  // Find or create the content div
  let contentDiv = currentThinkingEl.querySelector('.thinking-content');
  let timeDiv = currentThinkingEl.querySelector('.thinking-time');

  if (!contentDiv) {
    contentDiv = document.createElement('div');
    contentDiv.className = 'thinking-content';
    currentThinkingEl.appendChild(contentDiv);
  }
  if (!timeDiv) {
    timeDiv = document.createElement('div');
    timeDiv.className = 'thinking-time';
    currentThinkingEl.appendChild(timeDiv);
  }

  contentDiv.textContent = event.text;
  timeDiv.textContent = formatTime(event.timestamp);
}

function createMessageEl(event, animate) {
  // Route thinking/narration events to the thinking panel
  if (isThinkingEvent(event.event_type)) {
    setCurrentThinking(event);
    return null;
  }

  // All other events go to the action feed
  if (emptyState && emptyState.parentNode) {
    emptyState.remove();
  }

  const div = document.createElement('div');
  div.className = `message ${event.event_type || 'action'}`;
  div.dataset.eventId = event.id;

  const content = document.createElement('span');
  content.className = 'content';

  const time = document.createElement('span');
  time.className = 'timestamp';
  time.textContent = formatTime(event.timestamp);

  div.appendChild(content);
  div.appendChild(time);
  messagesEl.appendChild(div);

  if (animate) {
    // Skip animation when queue is backing up (3+ pending) or text is long
    if (typingQueue.length >= 3 || (event.text && event.text.length > 100)) {
      content.textContent = event.text;
    } else {
      typeText(content, event.text);
    }
  } else {
    content.textContent = event.text;
  }

  trimOldMessages();
  scrollToBottom();
  return div;
}

function typeText(el, text) {
  typingQueue.push({ el, text });
  if (!isTyping) {
    processTypingQueue();
  }
}

function processTypingQueue() {
  if (typingQueue.length === 0) {
    isTyping = false;
    return;
  }
  isTyping = true;
  const { el, text } = typingQueue.shift();

  // Add cursor
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  el.after(cursor);

  let i = 0;
  const speed = 15; // ms per character

  function tick() {
    if (i < text.length) {
      // Add characters in small chunks for efficiency
      const chunk = text.substring(i, Math.min(i + 2, text.length));
      el.textContent += chunk;
      i += chunk.length;
      scrollToBottom();
      setTimeout(tick, speed);
    } else {
      cursor.remove();
      processTypingQueue();
    }
  }
  tick();
}

// Load history on page load
async function loadHistory() {
  try {
    const resp = await fetch(`/events/history?since_id=${lastEventId}`);
    const events = await resp.json();
    events.forEach(ev => {
      if (ev.id > lastEventId) {
        createMessageEl(ev, false); // No animation for history
        lastEventId = ev.id;
      }
    });
  } catch (e) {
    console.error('Failed to load history:', e);
  }
}

function setConnected(connected) {
  statusDot.classList.toggle('connected', connected);
  statusText.textContent = connected ? '已连接' : '已断开';
}

function connectSSE() {
  if (eventSource) {
    eventSource.close();
  }

  eventSource = new EventSource('/events/stream');

  eventSource.onopen = () => {
    setConnected(true);
  };

  eventSource.addEventListener('message', (e) => {
    const event = JSON.parse(e.data);
    if (event.id > lastEventId) {
      createMessageEl(event, true); // Animate new events
      lastEventId = event.id;
    }
  });

  eventSource.addEventListener('clear', () => {
    // Clear action feed
    messagesEl.innerHTML = '';
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.id = 'emptyState';
    empty.innerHTML = '<div class="icon">🎮</div><p>等待 AI 开始游戏...<br>操作记录将实时显示在这里。</p>';
    messagesEl.appendChild(empty);

    // Clear thinking panel
    currentThinkingData = null;
    const contentDiv = currentThinkingEl.querySelector('.thinking-content');
    const timeDiv = currentThinkingEl.querySelector('.thinking-time');
    if (contentDiv) contentDiv.remove();
    if (timeDiv) timeDiv.remove();
    const emptyThink = document.createElement('div');
    emptyThink.className = 'empty-thinking';
    emptyThink.id = 'thinkingEmpty';
    emptyThink.textContent = '等待 AI 开始分析...';
    currentThinkingEl.appendChild(emptyThink);

    // Clear thinking history (keep label)
    const items = thinkingHistoryEl.querySelectorAll('.thinking-history-item');
    items.forEach(item => item.remove());

    lastEventId = 0;
    typingQueue = [];
    isTyping = false;
  });

  eventSource.onerror = () => {
    setConnected(false);
    eventSource.close();
    // Reconnect with exponential backoff
    setTimeout(connectSSE, 3000);
  };
}

async function clearHistory() {
  try {
    await fetch('/api/clear', { method: 'POST' });
    // SSE 'clear' event will handle the DOM cleanup
  } catch (e) {
    console.error('Failed to clear:', e);
  }
}

// Bootstrap
loadHistory().then(() => {
  connectSSE();
});
</script>
</body>
</html>
