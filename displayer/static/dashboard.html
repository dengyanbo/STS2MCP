<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STS2 AI 思考面板</title>
<style>
  :root {
    --bg: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-bubble: #0f3460;
    --text: #e0e0e0;
    --text-muted: #888;
    --accent: #e94560;
    --accent-dim: #533483;
    --border: #2a2a4a;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --blue: #60a5fa;
    --cyan: #22d3ee;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  header h1 .icon { font-size: 20px; }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    transition: background 0.3s;
  }

  .status-dot.connected { background: var(--green); }

  .controls {
    display: flex;
    gap: 8px;
  }

  .controls button {
    background: var(--bg);
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }

  .controls button:hover {
    color: var(--text);
    border-color: var(--accent);
  }

  /* ===== Status bar ===== */
  #status-bar {
    background: #0d1b30;
    border-bottom: 1px solid var(--border);
    padding: 6px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 13px;
    flex-shrink: 0;
    min-height: 32px;
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }

  .stat-item .stat-icon { font-size: 14px; }

  .stat-item .stat-value {
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .stat-item .stat-label {
    color: var(--text-muted);
    font-size: 11px;
  }

  .stat-hp { color: var(--green); }
  .stat-hp.hurt { color: var(--yellow); }
  .stat-hp.danger { color: var(--red); }
  .stat-energy { color: var(--cyan); }
  .stat-gold { color: var(--yellow); }
  .stat-floor { color: var(--blue); }
  .stat-deck { color: var(--text); }

  #status-bar .stat-separator {
    width: 1px;
    height: 16px;
    background: var(--border);
  }

  #stat-scene {
    color: var(--text-muted);
    font-size: 12px;
    margin-left: auto;
  }

  /* ===== Two-column layout ===== */
  #main-layout {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* --- Left: Thinking panel --- */
  #thinking-panel {
    width: 38%;
    min-width: 320px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: #141428;
    position: relative;
  }

  #thinking-panel .panel-header {
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    color: var(--blue);
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #current-thinking {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    max-height: 45%;
    overflow-y: auto;
  }

  #current-thinking .label {
    font-size: 11px;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  #current-thinking .thinking-content {
    background: linear-gradient(135deg, #122040 0%, #1a2d50 100%);
    border: 1px solid var(--blue);
    border-left: 3px solid var(--blue);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 14.5px;
    line-height: 1.85;
    word-wrap: break-word;
    color: #e8edf5;
  }

  /* Structured thinking section headers */
  .thinking-section-header {
    font-weight: 700;
    display: block;
    margin-top: 6px;
  }
  .thinking-section-header:first-child { margin-top: 0; }
  .section-situation { color: var(--blue); }
  .section-options { color: var(--cyan); }
  .section-evaluate { color: var(--yellow); }
  .section-decision { color: var(--green); }
  .section-risk { color: var(--red); }

  #current-thinking .thinking-time {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
    text-align: right;
  }

  #current-thinking .empty-thinking {
    color: var(--text-muted);
    font-size: 13px;
    text-align: center;
    padding: 24px 0;
  }

  #thinking-history {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
  }

  #thinking-history .label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
    padding-left: 4px;
    flex-shrink: 0;
  }

  .thinking-history-item {
    background: var(--bg-bubble);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
    opacity: 0.75;
    transition: opacity 0.2s;
  }

  .thinking-history-item:hover {
    opacity: 1;
  }

  .thinking-history-item .hist-time {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
    display: block;
  }

  .thinking-history-item.is-thinking {
    border-left: 2px solid var(--cyan);
  }

  .thinking-history-item.is-narration {
    border-left: 2px solid var(--blue);
  }

  /* --- Right: Action feed --- */
  #action-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .message {
    max-width: 95%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    animation: fadeIn 0.2s ease;
    word-wrap: break-word;
  }

  .message.thinking {
    background: var(--bg-bubble);
    border: 1px solid var(--border);
    align-self: flex-start;
  }

  .message.narration {
    background: linear-gradient(135deg, #1a2744 0%, #1e2d4d 100%);
    border: 1px solid #3b5998;
    border-left: 3px solid var(--blue);
    align-self: stretch;
    font-size: 14.5px;
    line-height: 1.8;
    padding: 14px 18px;
  }

  .message.action {
    background: var(--accent-dim);
    border: 1px solid #6b3fa0;
    align-self: flex-start;
  }

  .message.state {
    background: #0d2847;
    border: 1px solid #1e3a5f;
    align-self: flex-start;
    font-family: 'Cascadia Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.5;
  }

  .message.turn_end {
    background: #1a1a2e;
    border: 1px solid var(--yellow);
    border-left: 3px solid var(--yellow);
    align-self: stretch;
    text-align: center;
    font-size: 13px;
    color: var(--yellow);
    padding: 6px 14px;
  }

  .message.navigation {
    background: #0d2e1e;
    border: 1px solid #1a5c3a;
    align-self: flex-start;
  }

  .message.error {
    background: #3b1111;
    border: 1px solid #7f1d1d;
    align-self: flex-start;
  }

  .message .timestamp {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    display: block;
  }

  .message .content {
    white-space: pre-wrap;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--text-muted);
    text-align: center;
    gap: 12px;
  }

  .empty-state .icon { font-size: 48px; }
  .empty-state p { font-size: 14px; max-width: 300px; }

  /* ===== New message indicators ===== */
  .new-msg-btn {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--blue);
    color: #fff;
    border: none;
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    z-index: 10;
    display: none;
    transition: opacity 0.2s;
  }

  .new-msg-btn:hover { opacity: 0.9; }

  .new-msg-btn.visible { display: block; }

  /* Scrollbar styling */
  #messages::-webkit-scrollbar,
  #thinking-history::-webkit-scrollbar,
  #current-thinking::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-track,
  #thinking-history::-webkit-scrollbar-track,
  #current-thinking::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb,
  #thinking-history::-webkit-scrollbar-thumb,
  #current-thinking::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }
  #messages::-webkit-scrollbar-thumb:hover,
  #thinking-history::-webkit-scrollbar-thumb:hover,
  #current-thinking::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* Resize handle between panels */
  #panel-resize {
    width: 4px;
    cursor: col-resize;
    background: var(--border);
    transition: background 0.2s;
    flex-shrink: 0;
  }
  #panel-resize:hover { background: var(--blue); }
</style>
</head>
<body>

<header>
  <h1><span class="icon">🎮</span> STS2 AI 思考面板</h1>
  <div style="display: flex; align-items: center; gap: 16px;">
    <div class="controls">
      <button onclick="clearHistory()">清除</button>
    </div>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">连接中...</span>
    </div>
  </div>
</header>

<!-- Status snapshot bar -->
<div id="status-bar">
  <div class="stat-item stat-hp" id="statHp">
    <span class="stat-icon">❤️</span>
    <span class="stat-value" id="statHpVal">--/--</span>
  </div>
  <div class="stat-separator"></div>
  <div class="stat-item stat-energy" id="statEnergy">
    <span class="stat-icon">⚡</span>
    <span class="stat-value" id="statEnergyVal">--</span>
  </div>
  <div class="stat-separator"></div>
  <div class="stat-item stat-floor">
    <span class="stat-icon">🗺️</span>
    <span class="stat-value" id="statFloorVal">--</span>
    <span class="stat-label">层</span>
  </div>
  <div class="stat-separator"></div>
  <div class="stat-item stat-gold">
    <span class="stat-icon">💰</span>
    <span class="stat-value" id="statGoldVal">--</span>
  </div>
  <div class="stat-separator"></div>
  <div class="stat-item stat-deck">
    <span class="stat-icon">🃏</span>
    <span class="stat-value" id="statDeckVal">--</span>
    <span class="stat-label">张</span>
  </div>
  <span id="stat-scene"></span>
</div>

<div id="main-layout">
  <!-- Left: AI Thinking Panel -->
  <div id="thinking-panel">
    <div class="panel-header">🧠 AI 思考过程</div>
    <div id="current-thinking">
      <div class="label">当前思考</div>
      <div class="empty-thinking" id="thinkingEmpty">等待 AI 开始分析...</div>
    </div>
    <div id="thinking-history">
      <div class="label">思考历史</div>
    </div>
    <button class="new-msg-btn" id="newThinkingBtn" onclick="jumpToThinkingBottom()">⬇ <span id="newThinkingCount">0</span> 条新思考</button>
  </div>

  <div id="panel-resize"></div>

  <!-- Right: Action Feed -->
  <div id="action-panel">
    <div id="messages">
      <div class="empty-state" id="emptyState">
        <div class="icon">🎮</div>
        <p>等待 AI 开始游戏...<br>操作记录将实时显示在这里。</p>
      </div>
    </div>
    <button class="new-msg-btn" id="newActionBtn" onclick="jumpToActionBottom()">⬇ <span id="newActionCount">0</span> 条新操作</button>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const thinkingPanel = document.getElementById('thinking-panel');
const currentThinkingEl = document.getElementById('current-thinking');
const thinkingHistoryEl = document.getElementById('thinking-history');
const thinkingEmpty = document.getElementById('thinkingEmpty');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const emptyState = document.getElementById('emptyState');

// Status bar elements
const statHpVal = document.getElementById('statHpVal');
const statHpEl = document.getElementById('statHp');
const statEnergyVal = document.getElementById('statEnergyVal');
const statFloorVal = document.getElementById('statFloorVal');
const statGoldVal = document.getElementById('statGoldVal');
const statDeckVal = document.getElementById('statDeckVal');
const statScene = document.getElementById('stat-scene');

// New message indicator elements
const newActionBtn = document.getElementById('newActionBtn');
const newActionCount = document.getElementById('newActionCount');
const newThinkingBtn = document.getElementById('newThinkingBtn');
const newThinkingCount = document.getElementById('newThinkingCount');

let autoScroll = true;
let autoScrollThinking = true;
let lastEventId = 0;
let eventSource = null;
const MAX_DOM_MESSAGES = 300;
const MAX_THINKING_HISTORY = 50;

// New message counters (when user scrolled up)
let missedActionCount = 0;
let missedThinkingCount = 0;

// rAF batching buffer
let pendingEvents = [];
let rafScheduled = false;

// Track whether thinking panel has content
let currentThinkingData = null;

// --- Panel resize ---
const resizeHandle = document.getElementById('panel-resize');
let isResizing = false;
resizeHandle.addEventListener('mousedown', (e) => {
  isResizing = true;
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});
document.addEventListener('mousemove', (e) => {
  if (!isResizing) return;
  const mainLayout = document.getElementById('main-layout');
  const rect = mainLayout.getBoundingClientRect();
  const pct = ((e.clientX - rect.left) / rect.width) * 100;
  if (pct > 20 && pct < 60) {
    thinkingPanel.style.width = pct + '%';
  }
});
document.addEventListener('mouseup', () => {
  if (isResizing) {
    isResizing = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});

// Detect if user scrolled up to pause auto-scroll (action feed)
messagesEl.addEventListener('scroll', () => {
  const threshold = 50;
  const atBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < threshold;
  autoScroll = atBottom;
  if (atBottom) {
    missedActionCount = 0;
    newActionBtn.classList.remove('visible');
  }
});

// Auto-scroll for thinking history
thinkingHistoryEl.addEventListener('scroll', () => {
  const threshold = 50;
  const atBottom = thinkingHistoryEl.scrollHeight - thinkingHistoryEl.scrollTop - thinkingHistoryEl.clientHeight < threshold;
  autoScrollThinking = atBottom;
  if (atBottom) {
    missedThinkingCount = 0;
    newThinkingBtn.classList.remove('visible');
  }
});

function scrollToBottom() {
  if (autoScroll) {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
}

function scrollThinkingToBottom() {
  if (autoScrollThinking) {
    thinkingHistoryEl.scrollTop = thinkingHistoryEl.scrollHeight;
  }
}

function jumpToActionBottom() {
  autoScroll = true;
  missedActionCount = 0;
  newActionBtn.classList.remove('visible');
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function jumpToThinkingBottom() {
  autoScrollThinking = true;
  missedThinkingCount = 0;
  newThinkingBtn.classList.remove('visible');
  thinkingHistoryEl.scrollTop = thinkingHistoryEl.scrollHeight;
}

function formatTime(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function trimOldMessages() {
  const msgs = messagesEl.querySelectorAll('.message');
  const overflow = msgs.length - MAX_DOM_MESSAGES;
  if (overflow > 0) {
    for (let i = 0; i < overflow; i++) {
      msgs[i].remove();
    }
  }
}

function trimThinkingHistory() {
  const items = thinkingHistoryEl.querySelectorAll('.thinking-history-item');
  const overflow = items.length - MAX_THINKING_HISTORY;
  if (overflow > 0) {
    for (let i = 0; i < overflow; i++) {
      items[i].remove();
    }
  }
}

// Check if this event type belongs to the thinking panel
function isThinkingEvent(eventType) {
  return eventType === 'narration' || eventType === 'thinking';
}

// --- Structured thinking rendering ---
const SECTION_MAP = [
  { prefix: '📍', cls: 'section-situation' },
  { prefix: '🔍', cls: 'section-options' },
  { prefix: '⚖️', cls: 'section-evaluate' },
  { prefix: '✅', cls: 'section-decision' },
  { prefix: '⚠️', cls: 'section-risk' },
];

function renderStructuredText(container, text) {
  container.innerHTML = '';
  const lines = text.split('\n');
  for (const line of lines) {
    let matched = false;
    for (const sec of SECTION_MAP) {
      if (line.trimStart().startsWith(sec.prefix)) {
        const span = document.createElement('span');
        span.className = 'thinking-section-header ' + sec.cls;
        span.textContent = line;
        container.appendChild(span);
        container.appendChild(document.createTextNode('\n'));
        matched = true;
        break;
      }
    }
    if (!matched) {
      container.appendChild(document.createTextNode(line + '\n'));
    }
  }
  // Remove trailing newline
  const last = container.lastChild;
  if (last && last.nodeType === Node.TEXT_NODE && last.textContent === '\n') {
    last.remove();
  }
}

// Push current thinking to history
function archiveCurrentThinking() {
  if (!currentThinkingData) return;

  const item = document.createElement('div');
  item.className = 'thinking-history-item ' +
    (currentThinkingData.event_type === 'thinking' ? 'is-thinking' : 'is-narration');

  const textSpan = document.createElement('span');
  textSpan.textContent = currentThinkingData.text;

  const timeSpan = document.createElement('span');
  timeSpan.className = 'hist-time';
  timeSpan.textContent = formatTime(currentThinkingData.timestamp);

  item.appendChild(textSpan);
  item.appendChild(timeSpan);
  thinkingHistoryEl.appendChild(item);

  trimThinkingHistory();
  scrollThinkingToBottom();

  // Update missed counter if not auto-scrolling
  if (!autoScrollThinking) {
    missedThinkingCount++;
    newThinkingCount.textContent = missedThinkingCount;
    newThinkingBtn.classList.add('visible');
  }
}

// Set content in the current thinking area
function setCurrentThinking(event) {
  archiveCurrentThinking();

  if (thinkingEmpty && thinkingEmpty.parentNode) {
    thinkingEmpty.remove();
  }

  currentThinkingData = event;

  let contentDiv = currentThinkingEl.querySelector('.thinking-content');
  let timeDiv = currentThinkingEl.querySelector('.thinking-time');

  if (!contentDiv) {
    contentDiv = document.createElement('div');
    contentDiv.className = 'thinking-content';
    currentThinkingEl.appendChild(contentDiv);
  }
  if (!timeDiv) {
    timeDiv = document.createElement('div');
    timeDiv.className = 'thinking-time';
    currentThinkingEl.appendChild(timeDiv);
  }

  // Use structured rendering for narration, plain text for thinking
  if (event.event_type === 'narration') {
    renderStructuredText(contentDiv, event.text);
  } else {
    contentDiv.textContent = event.text;
  }
  timeDiv.textContent = formatTime(event.timestamp);
}

// --- Status bar update ---
const SCENE_ZH = {
  monster: '⚔️ 战斗', elite: '⚔️ 精英战', boss: '👑 Boss战',
  map: '🗺️ 地图', event: '📜 事件', rest_site: '🔥 篝火',
  shop: '🛒 商店', treasure: '🎁 宝箱', rewards: '🏆 奖励',
  card_reward: '🃏 选卡', relic_select: '💎 选遗物',
  card_select: '✋ 选牌', bundle_select: '📦 选包',
};

function updateStatusBar(stateData) {
  if (!stateData || typeof stateData !== 'object') return;

  const player = stateData.player || {};
  const run = stateData.run || {};
  const st = stateData.state_type || '';

  // HP
  const hp = player.hp;
  const maxHp = player.max_hp;
  if (hp != null && maxHp != null) {
    statHpVal.textContent = `${hp}/${maxHp}`;
    const pct = maxHp > 0 ? hp / maxHp : 1;
    statHpEl.classList.remove('hurt', 'danger');
    if (pct < 0.3) statHpEl.classList.add('danger');
    else if (pct < 0.6) statHpEl.classList.add('hurt');
  }

  // Energy (only in combat)
  const energy = player.energy;
  if (energy != null) {
    statEnergyVal.textContent = energy;
  }

  // Floor
  const floor = run.floor;
  if (floor != null) {
    statFloorVal.textContent = floor;
  }

  // Gold
  const gold = player.gold;
  if (gold != null) {
    statGoldVal.textContent = gold;
  }

  // Deck size
  const deck = player.deck;
  if (Array.isArray(deck)) {
    statDeckVal.textContent = deck.length;
  }

  // Scene label
  statScene.textContent = SCENE_ZH[st] || st || '';
}

// --- Message creation (instant render, no typing animation) ---
function createMessageEl(event) {
  // Update status bar from state events
  if (event.event_type === 'state' && event.raw_data) {
    try {
      const rd = typeof event.raw_data === 'string' ? JSON.parse(event.raw_data) : event.raw_data;
      if (rd.state_snapshot) updateStatusBar(rd.state_snapshot);
    } catch (e) {}
  }

  // Route thinking/narration events to the thinking panel
  if (isThinkingEvent(event.event_type)) {
    setCurrentThinking(event);
    return;
  }

  // All other events go to the action feed
  if (emptyState && emptyState.parentNode) {
    emptyState.remove();
  }

  const div = document.createElement('div');
  div.className = `message ${event.event_type || 'action'}`;
  div.dataset.eventId = event.id;

  const content = document.createElement('span');
  content.className = 'content';
  content.textContent = event.text;

  const time = document.createElement('span');
  time.className = 'timestamp';
  time.textContent = formatTime(event.timestamp);

  div.appendChild(content);
  div.appendChild(time);
  messagesEl.appendChild(div);

  trimOldMessages();

  if (autoScroll) {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  } else {
    missedActionCount++;
    newActionCount.textContent = missedActionCount;
    newActionBtn.classList.add('visible');
  }
}

// --- rAF batching: buffer SSE events, flush once per frame ---
function scheduleFlush() {
  if (!rafScheduled) {
    rafScheduled = true;
    requestAnimationFrame(flushPendingEvents);
  }
}

function flushPendingEvents() {
  rafScheduled = false;
  const batch = pendingEvents;
  pendingEvents = [];
  for (const ev of batch) {
    createMessageEl(ev);
  }
}

// Load history on page load
async function loadHistory() {
  try {
    const resp = await fetch(`/events/history?since_id=${lastEventId}`);
    const events = await resp.json();
    for (const ev of events) {
      if (ev.id > lastEventId) {
        createMessageEl(ev);
        lastEventId = ev.id;
      }
    }
  } catch (e) {
    console.error('Failed to load history:', e);
  }
}

function setConnected(connected) {
  statusDot.classList.toggle('connected', connected);
  statusText.textContent = connected ? '已连接' : '已断开';
}

function connectSSE() {
  if (eventSource) {
    eventSource.close();
  }

  eventSource = new EventSource('/events/stream');

  eventSource.onopen = () => {
    setConnected(true);
  };

  eventSource.addEventListener('message', (e) => {
    const event = JSON.parse(e.data);
    if (event.id > lastEventId) {
      lastEventId = event.id;
      pendingEvents.push(event);
      scheduleFlush();
    }
  });

  eventSource.addEventListener('clear', () => {
    // Clear action feed
    messagesEl.innerHTML = '';
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.id = 'emptyState';
    empty.innerHTML = '<div class="icon">🎮</div><p>等待 AI 开始游戏...<br>操作记录将实时显示在这里。</p>';
    messagesEl.appendChild(empty);

    // Clear thinking panel
    currentThinkingData = null;
    const contentDiv = currentThinkingEl.querySelector('.thinking-content');
    const timeDiv = currentThinkingEl.querySelector('.thinking-time');
    if (contentDiv) contentDiv.remove();
    if (timeDiv) timeDiv.remove();
    const emptyThink = document.createElement('div');
    emptyThink.className = 'empty-thinking';
    emptyThink.id = 'thinkingEmpty';
    emptyThink.textContent = '等待 AI 开始分析...';
    currentThinkingEl.appendChild(emptyThink);

    // Clear thinking history (keep label)
    const items = thinkingHistoryEl.querySelectorAll('.thinking-history-item');
    items.forEach(item => item.remove());

    // Reset all counters
    lastEventId = 0;
    missedActionCount = 0;
    missedThinkingCount = 0;
    newActionBtn.classList.remove('visible');
    newThinkingBtn.classList.remove('visible');
    pendingEvents = [];
    rafScheduled = false;

    // Reset status bar
    statHpVal.textContent = '--/--';
    statEnergyVal.textContent = '--';
    statFloorVal.textContent = '--';
    statGoldVal.textContent = '--';
    statDeckVal.textContent = '--';
    statScene.textContent = '';
    statHpEl.classList.remove('hurt', 'danger');
  });

  eventSource.onerror = () => {
    setConnected(false);
    eventSource.close();
    setTimeout(connectSSE, 3000);
  };
}

async function clearHistory() {
  try {
    await fetch('/api/clear', { method: 'POST' });
  } catch (e) {
    console.error('Failed to clear:', e);
  }
}

// Bootstrap
loadHistory().then(() => {
  connectSSE();
});
</script>
